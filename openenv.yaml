name: grid-load-balancer
version: 0.1.0
benchmark: power_grid
description: >
  A city-scale power distribution environment where an AI agent balances load between zones,
  dispatches generators, manages batteries, requests imports, and protects critical services.
author: hackathon-submission
tags:
  - openenv
  - energy
  - power-grid
  - real-world
entrypoint:
  module: env.engine
  class: GridLoadBalancerEnv
interfaces:
  reset: reset
  step: step
  state: state
models:
  action: env.models.GridAction
  observation: env.models.GridObservation
  state: env.models.GridState
tasks:
  - id: weekday_spike
    name: Weekday Spike Recovery
    difficulty: easy
    objective: Restore balance after a business district demand spike.
    description: Restore balance after a business district demand spike.
    max_steps: 8
    success_threshold: 0.75
    grader: server.graders.grade_weekday_spike
  - id: sunset_transition
    name: Sunset Renewable Transition
    difficulty: medium
    objective: Handle the evening peak while solar fades and wind varies.
    description: Handle the evening peak while solar fades and wind varies.
    max_steps: 10
    success_threshold: 0.70
    grader: server.graders.grade_sunset_transition
  - id: heatwave_failure
    name: Heatwave Generator Failure
    difficulty: hard
    objective: Protect critical infrastructure after generator failure during a heatwave.
    description: Protect critical infrastructure after generator failure during a heatwave.
    max_steps: 12
    success_threshold: 0.40
    grader: server.graders.grade_heatwave_failure
reward:
  type: shaped
  description: >
    Partial reward encourages blackout avoidance, critical-service protection,
    energy efficiency, cost control, and response speed at every step.
endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  validate: GET /validate
  grader: GET /grader
  grader_task: GET /grader/{task_id}
  grade: GET /grade/{task_id}
runtime:
  port: 7860
  framework: fastapi
